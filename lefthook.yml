---
output:
  - failure

# Lean gate (strategy B): only remotes whose wrappers ship in the
# nix-lefthook bundle ci devShell. Deferred remotes (no wrapper yet)
# tracked in SPEC §B B1 / §T T52,T53,T54 — restore per-task.
remotes:
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nixfmt
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-statix
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-deadnix
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-nix-no-embedded-shell
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-shellcheck
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-shfmt
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-yamllint
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-taplo
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-markdownlint-agentic
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-typos
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-trailing-whitespace
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-missing-final-newline
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-git-conflict-markers
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-git-no-local-paths
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-gitleaks
    ref: main
    configs:
      - lefthook-remote.yml
  - git_url: https://github.com/pr0d1r2/nix-lefthook-editorconfig-checker
    ref: main
    configs:
      - lefthook-remote.yml

# Generated/binary artifacts text linters must not scan.
_exclude_artifacts: &exclude_artifacts
  - "cv.pdf"
  - "avatar.png"
  - "cv.txt"
  - "flake.lock"

pre-commit:
  parallel: true
  commands:
    rebuild:
      glob: "cv.typ"
      run: timeout ${LEFTHOOK_REBUILD_TIMEOUT:-30} bash scripts/hooks/rebuild.sh
    typstyle:
      glob: "*.typ"
      run: timeout ${LEFTHOOK_TYPSTYLE_TIMEOUT:-10} typstyle --check {staged_files}
    trailing-whitespace:
      exclude: *exclude_artifacts
    missing-final-newline:
      exclude: *exclude_artifacts
    typos:
      exclude: *exclude_artifacts
    editorconfig-checker:
      exclude: *exclude_artifacts

pre-push:
  parallel: true
  commands:
    rebuild:
      glob: "cv.typ"
      run: timeout ${LEFTHOOK_REBUILD_TIMEOUT:-30} bash scripts/hooks/rebuild.sh
    typstyle:
      glob: "*.typ"
      run: timeout ${LEFTHOOK_TYPSTYLE_TIMEOUT:-10} typstyle --check {push_files}
    trailing-whitespace:
      exclude: *exclude_artifacts
    missing-final-newline:
      exclude: *exclude_artifacts
    typos:
      exclude: *exclude_artifacts
    editorconfig-checker:
      exclude: *exclude_artifacts
